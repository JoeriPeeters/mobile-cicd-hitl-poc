<!doctype html>
<!--
  Minimal web render of the app screen — the SEAM for the visual test.
  This static page stands in for the real UI so Playwright has something to
  screenshot today. Swap this for the Expo web export later:
      expo export --platform web   →   serve web-build/  (Playwright unchanged)
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HITL CI/CD POC</title>
    <style>
      :root { --brand: #b60205; --bg: #0f1220; --card: #1b1f36; --text: #eef; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, system-ui, sans-serif;
             background: var(--bg); color: var(--text); }
      .app { min-height: 100vh; display: flex; flex-direction: column; }
      header { background: var(--brand); padding: 20px 16px; }
      header h1 { margin: 0; font-size: 20px; }
      header p { margin: 4px 0 0; opacity: .85; font-size: 13px; }
      main { padding: 16px; display: grid; gap: 12px; }
      .card { background: var(--card); border-radius: 14px; padding: 16px; }
      .card h2 { margin: 0 0 6px; font-size: 15px; }
      .card p { margin: 0; opacity: .8; font-size: 13px; }
      .cta { margin-top: auto; padding: 16px; }
      button { width: 100%; padding: 14px; border: 0; border-radius: 12px;
               background: var(--brand); color: #fff; font-size: 16px; font-weight: 600; }
      .badge { display: inline-block; background: #2a2f52; padding: 2px 8px;
               border-radius: 999px; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>HITL CI/CD POC</h1>
        <!-- version is hard-coded in the seam; the real app reads src/version.js -->
        <p>React Native · <span class="badge">v0.1.0</span></p>
      </header>
      <main>
        <section class="card">
          <h2>Instrumented mobile simulation</h2>
          <p>Playwright renders this screen at mobile viewports and captures it as
             visual evidence on every PR.</p>
        </section>
        <section class="card">
          <h2>Human-in-the-loop</h2>
          <p>Reviewers see the actual rendered UI before approving the merge.</p>
        </section>
      </main>
      <div class="cta">
        <button>Get started</button>
      </div>
    </div>
  </body>
</html>
